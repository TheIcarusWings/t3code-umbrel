name: Build and push image

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/theicaruswings/t3code-umbrel

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read t3 version from Dockerfile
        id: version
        run: |
          T3_VERSION=$(sed -n 's/^ARG T3_VERSION=//p' docker/Dockerfile)
          echo "t3=$T3_VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.t3 }}
            ${{ env.IMAGE }}:latest

      - name: Print manifest digest for compose pinning
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.version.outputs.t3 }}
