manifestVersion: 1
id: icarus-t3-code
name: T3 Code
tagline: Web GUI for coding agents - your Umbrel as a cloud workstation
icon: https://raw.githubusercontent.com/pingdotgg/t3code/main/favicon.svg
category: Development
version: "0.0.28.1"
port: 3773
description: >-
  T3 Code is a minimal web GUI for coding agents (Codex, Claude Code, Cursor,
  and OpenCode). This package runs the T3 Code server on your Umbrel so your
  repositories, git state, terminals, and agent sessions live on the server
  and are reachable from any device with a browser.

  Setup is one click: opening the app from the Umbrel dashboard pairs your
  browser automatically. To pair a phone or another device, open the app from
  the dashboard on that device, or create a token from a terminal inside
  T3 Code with `t3 auth pairing create`.

  After pairing, open a terminal inside T3 Code and log in to your providers,
  for example `claude auth login`, `codex login`, or `opencode auth login`.
  Auth state persists in the app's data directory.

  Repositories live under ~/projects inside the app. Clone with the built-in
  terminal or create projects from the sidebar.
developer: T3 Tools (packaged by TheIcarusWings)
website: https://t3.gg
submitter: TheIcarusWings
submission: https://github.com/TheIcarusWings/t3code-umbrel
repo: https://github.com/TheIcarusWings/t3code-umbrel
support: https://github.com/TheIcarusWings/t3code-umbrel/issues
gallery: []
path: "/umbrel-setup"
releaseNotes: >-
  One-click pairing: opening the app from the Umbrel dashboard now pairs your
  browser automatically (no more copying tokens from logs). Fixes project
  creation failing with "Failed to create workspace root".
dependencies: []
defaultUsername: ""
defaultPassword: ""
