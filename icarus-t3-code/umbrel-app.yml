category: Development
version: "0.0.28"
port: 3773
description: >-
  T3 Code is a minimal web GUI for coding agents (Codex, Claude Code, Cursor,
  and OpenCode). This package runs the T3 Code server on your Umbrel so your
  repositories, git state, terminals, and agent sessions live on the server
  and are reachable from any device with a browser.

  First run: open the app, then paste the one-time pairing token printed in
  the app logs (Settings -> Troubleshoot -> T3 Code logs). After pairing,
  open a terminal inside T3 Code and log in to your providers, for example
  `claude auth login`, `codex login`, or `opencode auth login`. Auth state
  persists in the app's data directory.

  Repositories live under /data/home/projects inside the app. Clone with the
  built-in terminal and add the folder as a project in the sidebar.
