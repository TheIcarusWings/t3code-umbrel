version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: icarus-t3-code_gateway_1
      APP_PORT: 8080
      # T3 Code has its own auth (one-time-token pairing, forced whenever it
      # binds a non-loopback host), and native T3 clients need direct
      # WebSocket access, so Umbrel's session auth stays off for the app
      # itself. The one exception is /umbrel-setup: it mints pairing tokens,
      # so it must only be reachable with an Umbrel dashboard session.
      PROXY_AUTH_ADD: "true"
      PROXY_AUTH_WHITELIST: "/*"
      PROXY_AUTH_BLACKLIST: "/umbrel-setup*"

  # Routes /umbrel-setup to the pairing helper and everything else to T3 Code.
  # The config is written inline instead of bind-mounted so app updates can
  # change it; Umbrel only seeds ${APP_DATA_DIR} on first install.
  gateway:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: on-failure
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        {
        	admin off
        	auto_https off
        }
        :8080 {
        	handle /umbrel-setup* {
        		reverse_proxy icarus-t3-code_helper_1:3999
        	}
        	handle {
        		reverse_proxy icarus-t3-code_server_1:3773
        	}
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile

  server:
    image: ghcr.io/theicaruswings/t3code-umbrel:0.0.28@sha256:b281c4430235a660a30b6d2411a4341859283639aa3ede121edf3aa7e2de5340
    restart: on-failure
    stop_grace_period: 30s
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      T3CODE_PORT: 3773

  # Serves the /umbrel-setup connect page. Mints a one-time pairing token only
  # for a caller that presents APP_PASSWORD, then redirects into T3 Code. This
  # container is directly reachable by any app on the shared docker network, so
  # the password check - not network position - is what protects it.
  helper:
    image: ghcr.io/theicaruswings/t3code-umbrel:0.0.28@sha256:b281c4430235a660a30b6d2411a4341859283639aa3ede121edf3aa7e2de5340
    restart: on-failure
    user: "1000:1000"
    entrypoint: ["node", "/gateway/setup-server.mjs"]
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      HOME: /data/home
      T3CODE_HOME: /data/home/.t3
      # Peer-unforgeable per-install secret. The helper mints a pairing token
      # only for a caller that presents it, so a malicious co-installed app
      # reaching this container directly on the shared network cannot pair.
      APP_PASSWORD: ${APP_PASSWORD}
